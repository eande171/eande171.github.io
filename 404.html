<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Eden Anderson - 404</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
        <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
        <link href="style.css" rel="stylesheet">
        <style>
            main {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 3rem 1.5rem;
            }
            .content { max-width: 480px; width: 100%; }
            .error-code {
                font-family: 'JetBrains Mono', monospace;
                font-size: clamp(5rem, 16vw, 9rem);
                font-weight: 700;
                color: var(--orange);
                line-height: 1;
                margin-bottom: 1rem;
                opacity: 0.25;
            }
            h1 {
                font-size: clamp(1.6rem, 4vw, 2.2rem);
                font-weight: 700;
                letter-spacing: -0.02em;
                margin-bottom: 0.75rem;
            }
            .subtitle {
                font-size: 0.95rem;
                line-height: 1.8;
                color: rgba(232, 241, 242, 0.6);
                margin-bottom: 2rem;
            }
        </style>
    </head>
    <body>
        <script>AOS.init({ once: true });</script>

        <main>
            <div class="content">
                <div class="error-code" data-aos="fade-up" data-aos-delay="50">404</div>
                <h1 data-aos="fade-up" data-aos-delay="150">Page not found.</h1>
                <p class="subtitle" data-aos="fade-up" data-aos-delay="250">
                    oops! what you were looking for isn't here... weird...
                </p>
                <a class="back-link" href="index.html" data-aos="fade-up" data-aos-delay="350">← back to home</a>
            </div>
        </main>

        <footer>built with ☕ (<a href="https://eande171.hashnode.dev">hot milo</a>) and hot (<a href="https://ko-fi.com/eande171">ko-fi</a>)</footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
